name: Update Gradio Live URLs

on:
  schedule:
    # 北京时间 0、6、12、18 点运行（UTC 16、22、4、10 点）
    - cron: '0 16,22,4,10 * * *'
  # 允许在 GitHub Actions 页面手动触发
  workflow_dispatch:

# 只需读权限，不再需要 commit 代码
permissions:
  contents: read

jobs:
  update-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch Gradio Live URLs → update Gist
        env:
          # PAT 需有 gist scope，在 Settings → Secrets → Actions 中添加
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: node scripts/fetch-gradio-urls.mjs
