# CI — lint + build on every push/PR
# CD — deploy to GitHub Pages on push to main
name: CI / Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# ─────────────────────────────────────────────
# Job 1: Lint → Build → Upload Pages artifact
# ─────────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # GitHub Pages 项目站点路径（如 /imageTo3d/），自动取仓库名
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          # Optional ReconViaGen-compatible Gradio API URL.
          # Defaults to https://stable-x-reconviagen.hf.space when unset.
          VITE_GRADIO_URL: ${{ secrets.VITE_GRADIO_URL }}

      # 仅 main 分支才上传 Pages artifact
      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ─────────────────────────────────────────────
  # Job 2: Deploy（仅 main 分支）
  # ─────────────────────────────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
